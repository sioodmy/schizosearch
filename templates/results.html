{% extends "base.html" %}


{% block content %}
{% let (style_sheet, class_name) = turf::inline_style_sheet!("style/results.scss") %}

{% include "navbar.html" %}

<main>
  {% for result in results %}
  <div class="{{ class_name.result }}">
    <a href="{{ result.link}}">
      {{ result.link }}
      <h2>{{ result.title }}</h2>
    </a>
    <span> {{ result.description }} </span>
  </div>

  {% endfor %}
</main>
<style>
  {{ style_sheet}}
</style>
{% endblock %}
